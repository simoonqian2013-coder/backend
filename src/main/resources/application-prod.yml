server:
  port: ${SERVER_PORT:8090}

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:pet_life}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-long-random-secret-please}
    expiration-minutes: 120
  upload:
    dir: ${UPLOAD_DIR:/app/uploads}
    url-prefix: /uploads/

logging:
  level:
    root: INFO
    com.qss.pet: INFO
